services:
  - type: web
    name: fabzclean-pos
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5005"
      - key: SKIP_SAMPLE_DATA
        value: "true"
      - key: DB_PATH
        value: /data/fabzclean.db
      - key: UPLOADS_DIR
        value: /data/uploads
    disk:
      name: fabzclean_storage
      mountPath: /data
      sizeGB: 1
